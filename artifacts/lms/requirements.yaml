packages:
  "framer-motion": "For page transitions and interactive animations"
  "recharts": "For admin dashboard analytics charts"
  "date-fns": "For formatting dates in UI"
  "react-hook-form": "For form state management"
  "@hookform/resolvers": "For zod validation in forms"
  "clsx": "For class merging"
  "tailwind-merge": "For class merging"

images:
  - path: "artifacts/lms/public/images/hero-bg.png"
    description: "Abstract soft gradient mesh in calm blue and indigo tones, modern SaaS professional look, subtle curves, very clean and minimalist"
    aspect_ratio: "16:9"
  - path: "artifacts/lms/public/images/logo.png"
    description: "Minimalist modern geometric logo mark for an education platform, deep blue and indigo, transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/lms/public/images/empty-state.png"
    description: "Clean modern minimal illustration of a folder or clipboard, calm blue tones, for empty state UI"
    aspect_ratio: "4:3"

notes:
  - Assumes `customFetch` reads `localStorage.getItem('token')` for the Authorization header.
  - The API hooks are pre-generated and imported from `@workspace/api-client-react`.
