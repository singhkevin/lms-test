openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: LMS Academy API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: courses
    description: Course management
  - name: sections
    description: Course section management
  - name: lessons
    description: Lesson management
  - name: enrollments
    description: Enrollment management
  - name: progress
    description: Progress tracking
  - name: orders
    description: Order management
  - name: live-sessions
    description: Live session management
  - name: community
    description: Community posts
  - name: notifications
    description: Notifications
  - name: analytics
    description: Analytics and reporting
  - name: affiliates
    description: Affiliate tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user session info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset email sent if account exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/google:
    get:
      operationId: googleOAuth
      tags: [auth]
      summary: Initiate Google OAuth flow
      responses:
        "302":
          description: Redirect to Google

  /auth/google/callback:
    get:
      operationId: googleOAuthCallback
      tags: [auth]
      summary: Google OAuth callback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect after login

  # USERS
  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (owner only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin/owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/UserRole"
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details with enrollments and orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/{userId}/password:
    patch:
      operationId: changeUserPassword
      tags: [users]
      summary: Change user password (self or admin)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # COURSES
  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List courses
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/CourseStatus"
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseListResponse"

    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a new course (instructor/admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "201":
          description: Course created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/catalog:
    get:
      operationId: getCourseCatalog
      tags: [courses]
      summary: Public course catalog
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Public course catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseListResponse"

  /courses/{courseId}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get course details
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course with sections and lessons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Update course
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete course (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /courses/{courseId}/publish:
    post:
      operationId: publishCourse
      tags: [courses]
      summary: Publish a course
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{courseId}/unpublish:
    post:
      operationId: unpublishCourse
      tags: [courses]
      summary: Unpublish a course (move to draft)
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unpublished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  # SECTIONS
  /courses/{courseId}/sections:
    get:
      operationId: listSections
      tags: [sections]
      summary: List sections for a course
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sections list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SectionWithLessons"

    post:
      operationId: createSection
      tags: [sections]
      summary: Create a section
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSectionRequest"
      responses:
        "201":
          description: Section created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"

  /courses/{courseId}/sections/{sectionId}:
    patch:
      operationId: updateSection
      tags: [sections]
      summary: Update section
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: sectionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSectionRequest"
      responses:
        "200":
          description: Updated section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"

    delete:
      operationId: deleteSection
      tags: [sections]
      summary: Delete section
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: sectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # LESSONS
  /courses/{courseId}/sections/{sectionId}/lessons:
    post:
      operationId: createLesson
      tags: [lessons]
      summary: Create a lesson in a section
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: sectionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonRequest"
      responses:
        "201":
          description: Lesson created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

  /courses/{courseId}/sections/{sectionId}/lessons/{lessonId}:
    get:
      operationId: getLesson
      tags: [lessons]
      summary: Get lesson details
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: sectionId
          in: path
          required: true
          schema:
            type: string
        - name: lessonId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

    patch:
      operationId: updateLesson
      tags: [lessons]
      summary: Update lesson
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: sectionId
          in: path
          required: true
          schema:
            type: string
        - name: lessonId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLessonRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

    delete:
      operationId: deleteLesson
      tags: [lessons]
      summary: Delete lesson
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: sectionId
          in: path
          required: true
          schema:
            type: string
        - name: lessonId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ENROLLMENTS
  /enrollments:
    get:
      operationId: listEnrollments
      tags: [enrollments]
      summary: List enrollments (admin sees all, student sees own)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: userId
          in: query
          schema:
            type: string
        - name: courseId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/EnrollmentStatus"
        - name: search
          in: query
          description: Search by student name or email (case-insensitive substring)
          schema:
            type: string
      responses:
        "200":
          description: Enrollments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentListResponse"

    post:
      operationId: createEnrollment
      tags: [enrollments]
      summary: Manually enroll a user in a course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnrollmentRequest"
      responses:
        "201":
          description: Enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "409":
          description: Already enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /enrollments/{enrollmentId}:
    get:
      operationId: getEnrollment
      tags: [enrollments]
      summary: Get enrollment details
      security:
        - bearerAuth: []
      parameters:
        - name: enrollmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Enrollment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"

    delete:
      operationId: revokeEnrollment
      tags: [enrollments]
      summary: Revoke enrollment (admin/owner)
      security:
        - bearerAuth: []
      parameters:
        - name: enrollmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # PROGRESS
  /progress:
    get:
      operationId: getMyProgress
      tags: [progress]
      summary: Get progress for current user
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Progress records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Progress"

  /progress/lesson/{lessonId}/complete:
    post:
      operationId: markLessonComplete
      tags: [progress]
      summary: Mark a lesson as complete
      security:
        - bearerAuth: []
      parameters:
        - name: lessonId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Progress"

  # ORDERS
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: userId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/OrderStatus"
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order details
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}/mark-paid:
    post:
      operationId: markOrderPaid
      tags: [orders]
      summary: Mark order as paid and auto-enroll
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order paid and enrollment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPaidResponse"

  # LIVE SESSIONS
  /live-sessions:
    get:
      operationId: listLiveSessions
      tags: [live-sessions]
      summary: List live sessions
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: query
          schema:
            type: string
        - name: upcoming
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Live sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LiveSession"

    post:
      operationId: createLiveSession
      tags: [live-sessions]
      summary: Schedule a live session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLiveSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveSession"

  /live-sessions/{sessionId}:
    get:
      operationId: getLiveSession
      tags: [live-sessions]
      summary: Get live session details
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveSession"

    patch:
      operationId: updateLiveSession
      tags: [live-sessions]
      summary: Update live session
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLiveSessionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveSession"

    delete:
      operationId: deleteLiveSession
      tags: [live-sessions]
      summary: Cancel live session
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # COMMUNITY
  /community/posts:
    get:
      operationId: listCommunityPosts
      tags: [community]
      summary: List community posts
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPostListResponse"

    post:
      operationId: createCommunityPost
      tags: [community]
      summary: Create a community post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityPostRequest"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPost"

  /community/posts/{postId}:
    delete:
      operationId: deleteCommunityPost
      tags: [community]
      summary: Delete a post (author or admin)
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ANALYTICS
  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get analytics summary (admin/owner only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  # AFFILIATES
  /affiliates:
    get:
      operationId: listAffiliates
      tags: [affiliates]
      summary: List affiliates
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Affiliates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Affiliate"

    post:
      operationId: createAffiliate
      tags: [affiliates]
      summary: Create affiliate tracking record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAffiliateRequest"
      responses:
        "201":
          description: Affiliate created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Affiliate"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ENUMS
    UserRole:
      type: string
      enum: [owner, instructor, student]

    CourseType:
      type: string
      enum: [recorded, live]

    CourseStatus:
      type: string
      enum: [draft, published, archived]

    EnrollmentStatus:
      type: string
      enum: [active, revoked, expired]

    OrderStatus:
      type: string
      enum: [pending, paid, failed, refunded]

    LessonType:
      type: string
      enum: [video, text, quiz, live]

    # AUTH SCHEMAS
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          $ref: "#/components/schemas/UserRole"
      required: [name, email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [token, user]

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8
      required: [token, password]

    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
      required: [newPassword]

    # USER SCHEMAS
    UserProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, createdAt]

    UserDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        enrollments:
          type: array
          items:
            $ref: "#/components/schemas/Enrollment"
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required: [id, name, email, role, createdAt, enrollments, orders]

    CreateUserRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
          minLength: 8
        role:
          $ref: "#/components/schemas/UserRole"

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        avatarUrl:
          type: string

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    # COURSE SCHEMAS
    Course:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        longDescription:
          type: string
          nullable: true
        courseType:
          $ref: "#/components/schemas/CourseType"
        thumbnailUrl:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        paymentLink:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/CourseStatus"
        instructorId:
          type: string
        instructorName:
          type: string
          nullable: true
        enrollmentCount:
          type: integer
        moduleCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, slug, courseType, status, instructorId, enrollmentCount, createdAt, updatedAt]

    CourseDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        longDescription:
          type: string
          nullable: true
        courseType:
          $ref: "#/components/schemas/CourseType"
        thumbnailUrl:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        paymentLink:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/CourseStatus"
        instructorId:
          type: string
        instructorName:
          type: string
          nullable: true
        enrollmentCount:
          type: integer
        moduleCount:
          type: integer
        sections:
          type: array
          items:
            $ref: "#/components/schemas/SectionWithLessons"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, slug, courseType, status, instructorId, enrollmentCount, sections, createdAt, updatedAt]

    CourseListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Course"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    CreateCourseRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        longDescription:
          type: string
        courseType:
          $ref: "#/components/schemas/CourseType"
        thumbnailUrl:
          type: string
        price:
          type: number
      required: [title]

    UpdateCourseRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        longDescription:
          type: string
        courseType:
          $ref: "#/components/schemas/CourseType"
        thumbnailUrl:
          type: string
        price:
          type: number
        paymentLink:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/CourseStatus"

    # SECTION SCHEMAS
    Section:
      type: object
      properties:
        id:
          type: string
        courseId:
          type: string
        title:
          type: string
        order:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, courseId, title, order, createdAt]

    SectionWithLessons:
      type: object
      properties:
        id:
          type: string
        courseId:
          type: string
        title:
          type: string
        order:
          type: integer
        createdAt:
          type: string
          format: date-time
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/Lesson"
      required: [id, courseId, title, order, createdAt, lessons]

    CreateSectionRequest:
      type: object
      properties:
        title:
          type: string
        order:
          type: integer
      required: [title]

    UpdateSectionRequest:
      type: object
      properties:
        title:
          type: string
        order:
          type: integer

    # LESSON SCHEMAS
    Lesson:
      type: object
      properties:
        id:
          type: string
        sectionId:
          type: string
        title:
          type: string
        type:
          $ref: "#/components/schemas/LessonType"
        content:
          type: string
          nullable: true
        videoUrl:
          type: string
          nullable: true
        pdfUrl:
          type: string
          nullable: true
        zoomMeetingUrl:
          type: string
          nullable: true
        durationMinutes:
          type: integer
          nullable: true
        order:
          type: integer
        isFree:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, sectionId, title, type, order, isFree, createdAt]

    CreateLessonRequest:
      type: object
      properties:
        title:
          type: string
        type:
          $ref: "#/components/schemas/LessonType"
        content:
          type: string
        videoUrl:
          type: string
        pdfUrl:
          type: string
        zoomMeetingUrl:
          type: string
        durationMinutes:
          type: integer
        order:
          type: integer
        isFree:
          type: boolean
      required: [title, type]

    UpdateLessonRequest:
      type: object
      properties:
        title:
          type: string
        type:
          $ref: "#/components/schemas/LessonType"
        content:
          type: string
        videoUrl:
          type: string
        pdfUrl:
          type: string
        zoomMeetingUrl:
          type: string
        durationMinutes:
          type: integer
        order:
          type: integer
        isFree:
          type: boolean

    # ENROLLMENT SCHEMAS
    Enrollment:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        courseId:
          type: string
        courseName:
          type: string
          nullable: true
        userName:
          type: string
          nullable: true
        userEmail:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/EnrollmentStatus"
        enrolledAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required: [id, userId, courseId, status, enrolledAt]

    EnrollmentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Enrollment"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    CreateEnrollmentRequest:
      type: object
      properties:
        userId:
          type: string
        courseId:
          type: string
        expiresAt:
          type: string
          format: date-time
      required: [userId, courseId]

    # PROGRESS
    Progress:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        lessonId:
          type: string
        courseId:
          type: string
        completedAt:
          type: string
          format: date-time
      required: [id, userId, lessonId, courseId, completedAt]

    # ORDER SCHEMAS
    Order:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        courseId:
          type: string
        courseName:
          type: string
          nullable: true
        userName:
          type: string
          nullable: true
        amount:
          type: number
        currency:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        paymentGateway:
          type: string
          nullable: true
        gatewayOrderId:
          type: string
          nullable: true
        affiliateCode:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true
      required: [id, userId, courseId, amount, currency, status, createdAt]

    OrderListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    CreateOrderRequest:
      type: object
      properties:
        courseId:
          type: string
        amount:
          type: number
        currency:
          type: string
          default: INR
        affiliateCode:
          type: string
      required: [courseId, amount]

    UpdateOrderStatusRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"
      required: [status]

    OrderPaidResponse:
      type: object
      properties:
        order:
          $ref: "#/components/schemas/Order"
        enrollment:
          $ref: "#/components/schemas/Enrollment"
      required: [order, enrollment]

    # LIVE SESSION SCHEMAS
    LiveSession:
      type: object
      properties:
        id:
          type: string
        courseId:
          type: string
        courseName:
          type: string
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        scheduledAt:
          type: string
          format: date-time
        durationMinutes:
          type: integer
        meetingUrl:
          type: string
          nullable: true
        meetingId:
          type: string
          nullable: true
        instructorId:
          type: string
        instructorName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, courseId, title, scheduledAt, durationMinutes, instructorId, createdAt]

    CreateLiveSessionRequest:
      type: object
      properties:
        courseId:
          type: string
        title:
          type: string
        description:
          type: string
        scheduledAt:
          type: string
          format: date-time
        durationMinutes:
          type: integer
        meetingUrl:
          type: string
        meetingId:
          type: string
      required: [courseId, title, scheduledAt, durationMinutes]

    UpdateLiveSessionRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        scheduledAt:
          type: string
          format: date-time
        durationMinutes:
          type: integer
        meetingUrl:
          type: string
        meetingId:
          type: string

    # COMMUNITY
    CommunityPost:
      type: object
      properties:
        id:
          type: string
        courseId:
          type: string
          nullable: true
        authorId:
          type: string
        authorName:
          type: string
          nullable: true
        authorAvatarUrl:
          type: string
          nullable: true
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, authorId, content, createdAt]

    CommunityPostListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CommunityPost"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    CreateCommunityPostRequest:
      type: object
      properties:
        courseId:
          type: string
        content:
          type: string
      required: [content]

    # ANALYTICS
    AnalyticsSummary:
      type: object
      properties:
        totalUsers:
          type: integer
        totalStudents:
          type: integer
        totalInstructors:
          type: integer
        totalCourses:
          type: integer
        publishedCourses:
          type: integer
        totalEnrollments:
          type: integer
        activeEnrollments:
          type: integer
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        recentEnrollments:
          type: array
          items:
            $ref: "#/components/schemas/Enrollment"
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required:
        - totalUsers
        - totalStudents
        - totalInstructors
        - totalCourses
        - publishedCourses
        - totalEnrollments
        - activeEnrollments
        - totalOrders
        - totalRevenue
        - recentEnrollments
        - recentOrders

    # AFFILIATE
    Affiliate:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: string
          nullable: true
        code:
          type: string
        totalReferrals:
          type: integer
        totalRevenue:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, userId, code, totalReferrals, totalRevenue, createdAt]

    CreateAffiliateRequest:
      type: object
      properties:
        userId:
          type: string
        code:
          type: string
      required: [userId]
